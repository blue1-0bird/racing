<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nitro Rush – Racing Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }
    #game-wrapper {
      position: relative;
      width: min(100vw, calc(100vh * 4 / 3));
      aspect-ratio: 4 / 3;
      max-width: 1024px;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 80px rgba(255, 120, 0, 0.3), 0 0 200px rgba(0, 80, 255, 0.15);
    }
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      padding: 16px;
    }
    /* Speedometer */
    #speed-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,120,0,0.4);
      border-radius: 12px;
      padding: 10px 16px;
      backdrop-filter: blur(10px);
      text-align: center;
      min-width: 100px;
    }
    #speed-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2em;
      font-weight: 900;
      color: #ff7800;
      text-shadow: 0 0 20px rgba(255,120,0,0.8);
